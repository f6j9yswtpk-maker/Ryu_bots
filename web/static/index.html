<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tool Ryū — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070b14; --bg2:#0c1322; --bg3:#111d32;
  --panel:#0f1729; --panel2:#15223a; --panel3:#1a2b48;
  --border:rgba(146,171,219,.20); --border2:rgba(146,171,219,.35);
  --blue:#44b8ff; --blue2:#6366f1; --mint:#34d399;
  --grad:linear-gradient(120deg,#44b8ff 0%,#6366f1 55%,#38bdf8 100%);
  --green:#22d3a5; --red:#f43f5e; --orange:#fb923c; --yellow:#fbbf24; --purple:#a78bfa; --teal:#22d3ee;
  --t1:#f6f9ff; --t2:rgba(232,242,255,.72); --t3:rgba(193,212,239,.45);
  --ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  --r:14px; --rs:10px; --rxs:7px;
  --glass-bg:rgba(22,33,58,.68); --glass-border:rgba(146,171,219,.28);
  --btc:#fb923c; --eth:#38bdf8; --sol:#a78bfa; --xrp:#44b8ff;
  --glow-blue:0 0 20px rgba(68,184,255,.35);
  --glow-green:0 0 12px rgba(34,211,165,.28);
  --glow-red:0 0 12px rgba(244,63,94,.28);
  --brave:#ff6b3d;
  --brave-soft:rgba(255,107,61,.15);
  --brave-line:rgba(255,107,61,.34);
  --sb-expanded:122px;
  --sb-collapsed:46px;
  --fit-scale:1;
  --fit-left:0px;
  --fit-top:0px;
  --fit-w:1280;
  --fit-h:960;
}
html.dim{
  --bg:#0d1119; --bg2:#141b2b; --bg3:#1a2338;
  --panel:#171f31; --panel2:#1e2942; --panel3:#273655;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:radial-gradient(circle at 8% -8%,rgba(56,189,248,.12),transparent 42%),radial-gradient(circle at 94% 4%,rgba(99,102,241,.14),transparent 45%),var(--bg);
  color:var(--t1);font-family:var(--ui);font-size:13px;height:100%;-webkit-font-smoothing:antialiased
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(172,196,236,.28);border-radius:10px}
button{font-family:var(--ui);cursor:pointer;border:none;outline:none}
input{font-family:var(--mono);border:none;outline:none;background:transparent}
a{color:inherit;text-decoration:none}

.shell{
  display:grid;grid-template-rows:46px 1fr;overflow:hidden;
  width:calc(var(--fit-w) * 1px);
  height:calc(var(--fit-h) * 1px);
  position:fixed;
  left:var(--fit-left);
  top:var(--fit-top);
  transform:scale(var(--fit-scale));
  transform-origin:top left;
}
.body{display:flex;height:100%;overflow:hidden}
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:transparent}

.ticker{background:linear-gradient(90deg,rgba(8,11,21,.94),rgba(13,20,35,.9));border-bottom:1px solid var(--border);display:flex;align-items:center;overflow:hidden;backdrop-filter:blur(8px)}
.ticker-label{flex-shrink:0;padding:0 14px;height:100%;display:flex;align-items:center;background:var(--grad);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;color:#fff;white-space:nowrap}
.ticker-overflow{flex:1;overflow:hidden;position:relative}
.ticker-overflow::before,.ticker-overflow::after{content:'';position:absolute;top:0;width:28px;height:100%;z-index:2;pointer-events:none}
.ticker-overflow::before{left:0;background:linear-gradient(90deg,#0b111f,transparent)}
.ticker-overflow::after{right:0;background:linear-gradient(-90deg,#101a2d,transparent)}
.ticker-track{display:inline-flex;align-items:center;white-space:nowrap;will-change:transform;animation:ticker-scroll 40s linear infinite}
.ticker-track:hover{animation-play-state:paused}
@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tick-item{display:inline-flex;align-items:center;gap:7px;padding:0 18px;font-family:var(--mono);font-size:10px;font-weight:500;border-right:1px solid rgba(152,178,223,.14)}
.tick-coin{font-weight:700;letter-spacing:.05em}
.tick-price{color:var(--t1)}
.tick-chg{font-size:10px}
.tick-chg.up{color:var(--green)}
.tick-chg.dn{color:var(--red)}
.tick-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ticker-live{flex-shrink:0;padding:0 14px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--green);border-left:1px solid var(--border);animation:blink-live 2s ease-in-out infinite}
@keyframes blink-live{0%,100%{opacity:1}50%{opacity:.35}}

.sidebar{
  width:var(--sb-expanded);flex-shrink:0;
  background:linear-gradient(180deg,#111726,#0f1522);
  border-right:1px solid rgba(255,255,255,.08);
  box-shadow:inset -1px 0 0 rgba(255,255,255,.03),12px 0 24px rgba(0,0,0,.18);
  display:flex;flex-direction:column;padding:10px 6px;overflow-y:auto;
  transition:width .2s ease,padding .2s ease
}
.sb-brand{display:flex;align-items:center;gap:8px;padding:6px 6px 8px}
.sb-brand-icon{
  width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,#ff7a45,#ff5d38);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
  box-shadow:0 6px 16px rgba(255,107,61,.34)
}
.sb-brand-name{font-size:11px;font-weight:700;letter-spacing:0;line-height:1.1}
.sb-brand-sub{font-size:8px;color:rgba(232,242,255,.42);letter-spacing:.1em;text-transform:uppercase}
.accent{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-divider{height:1px;background:rgba(255,255,255,.08);margin:7px 4px}

.sb-cluster{margin-bottom:2px}
.sb-cluster-head,.sb-bot-item{
  display:flex;align-items:center;gap:7px;padding:7px 7px;border-radius:9px;
  color:rgba(232,242,255,.72);background:transparent;border:1px solid transparent;transition:all .16s;
  position:relative
}
.sb-cluster-head{cursor:pointer;user-select:none}
.sb-cluster-head:hover,.sb-bot-item:hover{
  background:rgba(255,255,255,.05);
  border-color:rgba(255,255,255,.08);
  color:var(--t1)
}
.sb-cluster.open>.sb-cluster-head,.sb-bot-item.sel{
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.1);
  color:var(--t1)
}
.sb-cluster.open>.sb-cluster-head::before,.sb-bot-item.sel::before{
  content:'';
  position:absolute;left:0;top:6px;bottom:6px;width:2px;
  border-radius:2px;background:var(--brave-line)
}
.sb-cluster-icon{width:18px;text-align:center;flex-shrink:0;font-size:13px;opacity:.75}
.sb-cluster-label{font-size:11px;font-weight:700;flex:1}
.sb-cluster-arrow{font-size:11px;color:rgba(232,242,255,.42);transition:transform .2s,opacity .2s;opacity:.65}
.sb-cluster.open>.sb-cluster-head .sb-cluster-arrow{opacity:1;transform:rotate(90deg)}
.sb-cluster-body{overflow:hidden;max-height:0;transition:max-height .25s ease;padding-left:6px}
.sb-cluster.open>.sb-cluster-body{max-height:320px}
.sb-bot-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.38)}
.sb-bot-dot.live-pulse{animation:dot-pulse 2s ease-in-out infinite}
@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sb-bot-coin{font-size:10px;font-weight:700;flex:1;letter-spacing:.03em}
.sb-bot-price,.sb-bot-unit,.sb-clock,.wh-clock,.tab-wl,.feed-ts{font-family:var(--mono)}
.sb-bot-price,.sb-bot-unit{font-size:9px;color:var(--t3);white-space:nowrap}
/* keep sidebar minimal and symbol-forward */
.sb-bot-price,.sb-bot-unit{display:none}

.sb-mode-wrap{display:flex;gap:4px;margin-bottom:2px}
.sb-mode-btn{
  flex:1;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:7px 4px;border-radius:9px;color:var(--t2);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);transition:all .18s
}
.sb-mode-btn.active-paper{background:rgba(255,107,61,.14);border-color:rgba(255,107,61,.36);color:#ff9b7c}
.sb-mode-btn.active-live{background:rgba(34,211,165,.14);border-color:rgba(34,211,165,.3);color:var(--green)}
.sb-mode-btn:hover:not(.active-paper):not(.active-live){background:rgba(255,255,255,.08);color:var(--t1)}

.sb-spacer{flex:1}
.sb-footer{
  padding:8px 10px;display:flex;flex-direction:column;gap:7px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px
}
.sb-status-row,.sb-footer-row2{display:flex;align-items:center;gap:6px}
.ws-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;transition:background .3s}
.ws-dot.on{background:var(--green);box-shadow:var(--glow-green)}
.sb-clock{font-size:9px;color:var(--t3)}
.tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:999px}
.tag.active{background:rgba(34,211,165,.13);color:var(--green)}
.tag.stopped{background:rgba(244,63,94,.14);color:var(--red)}
.dim-btn{
  margin-left:auto;width:24px;height:24px;border-radius:7px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s
}
.dim-btn:hover{background:var(--brave-soft);border-color:var(--brave-line)}
.pin-btn{
  margin-left:auto;width:24px;height:24px;border-radius:7px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s
}
.pin-btn:hover{background:rgba(255,255,255,.08)}
.pin-btn.active{background:var(--brave-soft);border-color:var(--brave-line);color:#ffb299}

/* Auto (collapsed) sidebar mode */
.body.sidebar-auto .sidebar{
  width:var(--sb-collapsed);
  padding-left:6px;
  padding-right:6px;
}
.body.sidebar-auto .sidebar:hover{
  width:var(--sb-expanded);
  padding-left:9px;
  padding-right:9px;
}

/* Collapsed look (only when not hovered) */
.body.sidebar-auto .sidebar:not(:hover) .sb-brand{
  justify-content:center;
  padding-left:0;
  padding-right:0;
}
.body.sidebar-auto .sidebar:not(:hover) .sb-brand-text,
.body.sidebar-auto .sidebar:not(:hover) .sb-mode-wrap,
.body.sidebar-auto .sidebar:not(:hover) .sb-divider,
.body.sidebar-auto .sidebar:not(:hover) .sb-footer .tag,
.body.sidebar-auto .sidebar:not(:hover) .sb-footer .sb-clock,
.body.sidebar-auto .sidebar:not(:hover) .sb-cluster-label,
.body.sidebar-auto .sidebar:not(:hover) .sb-cluster-arrow,
.body.sidebar-auto .sidebar:not(:hover) .sb-bot-coin,
.body.sidebar-auto .sidebar:not(:hover) .sb-bot-price,
.body.sidebar-auto .sidebar:not(:hover) .sb-bot-unit{
  opacity:0;
  width:0;
  max-width:0;
  overflow:hidden;
  pointer-events:none;
}
.body.sidebar-auto .sidebar:not(:hover) .sb-cluster-head,
.body.sidebar-auto .sidebar:not(:hover) .sb-bot-item{
  justify-content:center;
  padding-left:6px;
  padding-right:6px;
}
.body.sidebar-auto .sidebar:not(:hover) .sb-cluster-icon{
  margin:0;
}
.body.sidebar-auto .sidebar:not(:hover) .sb-footer{
  padding:6px;
}
.body.sidebar-auto .sidebar:not(:hover) .sb-footer-row2{
  justify-content:center;
}
.body.sidebar-auto .sidebar:not(:hover) .pin-btn,
.body.sidebar-auto .sidebar:not(:hover) .dim-btn{
  margin-left:0;
}
.body.sidebar-auto .sidebar:not(:hover) .sb-cluster-body{
  max-height:0 !important;
  padding-left:0;
}
.body.sidebar-auto .sidebar:not(:hover) .sb-status-row{
  justify-content:center;
}

.w-header{
  height:52px;display:flex;align-items:center;padding:0 20px;background:linear-gradient(180deg,rgba(14,22,38,.9),rgba(13,21,36,.7));border-bottom:1px solid var(--border);
  flex-shrink:0;gap:16px;backdrop-filter:blur(8px)
}
.wh-left,.wh-right{flex:1;display:flex;align-items:center;gap:8px}
.wh-right{justify-content:flex-end;gap:10px}
.wh-mode-badge{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:rgba(30,47,82,.44);border:1px solid rgba(130,164,229,.3)}
.wh-mode-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wh-timer{display:flex;align-items:center;gap:10px}
.wh-timer-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.wh-timer-digits{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--t1);letter-spacing:.02em;min-width:52px;text-align:right}
.wh-timer-track{width:130px;height:4px;background:rgba(122,155,217,.24);border-radius:999px;overflow:hidden}
.wh-timer-fill{
  height:100%;
  background:linear-gradient(90deg,#38bdf8,#6366f1,#22d3ee);
  background-size:220% 100%;
  transition:width .9s linear;border-radius:999px;
  animation:timer-flow 4s linear infinite
}
@keyframes timer-flow{0%{background-position:0 0}100%{background-position:220% 0}}
.wh-clock{font-size:10px;color:var(--t3)}
.compact-toggle{
  height:24px;padding:0 9px;border-radius:999px;
  font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--t2);background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);transition:all .15s
}
.compact-toggle:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.compact-toggle.active{
  color:var(--teal);background:rgba(34,211,238,.14);border-color:rgba(34,211,238,.34)
}
.window-phase{display:flex;align-items:center;gap:4px;min-width:112px}
.phase-cell{
  flex:1;height:6px;border-radius:999px;overflow:hidden;
  background:rgba(122,155,217,.18);border:1px solid rgba(146,171,219,.2)
}
.phase-fill{height:100%;width:0;background:linear-gradient(90deg,#22d3ee,#6366f1);transition:width .8s linear}
.phase-cell.done .phase-fill{width:100%;background:linear-gradient(90deg,#34d399,#22d3ee)}
.phase-cell.active .phase-fill{animation:phase-pulse 1.8s ease-in-out infinite}
@keyframes phase-pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}

.tab-strip{
  display:flex;align-items:center;gap:5px;padding:7px 14px;background:rgba(13,20,34,.64);
  border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;backdrop-filter:blur(6px)
}
.bot-tab{
  display:flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:700;color:var(--t2);
  background:rgba(35,53,88,.2);border:1px solid transparent;transition:all .15s;flex-shrink:0
}
.bot-tab:hover{background:rgba(60,88,146,.3);color:var(--t1)}
.bot-tab.sel{background:rgba(70,104,173,.4);border-color:rgba(138,173,239,.42);color:var(--t1);box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
.tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:.65}
.bot-tab.sel .tab-dot{opacity:1;box-shadow:0 0 8px currentColor}
.tab-wl{font-size:8px;color:var(--t3)}
.bot-tab.sel .tab-wl{color:var(--t2)}
.tab-streak{font-size:8px;color:var(--t3);font-family:var(--mono)}
.bot-tab.sel .tab-streak{color:var(--t2)}
.view-tabs{display:flex;align-items:center;gap:4px;margin-left:8px;padding-left:8px;border-left:1px solid var(--border)}
.view-tab{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:999px;
  font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
  color:var(--t2);background:rgba(35,53,88,.16);border:1px solid rgba(146,171,219,.22);
  transition:all .18s;flex-shrink:0
}
.view-tab:hover{background:rgba(60,88,146,.26);color:var(--t1)}
.view-tab.active{background:rgba(34,211,165,.16);border-color:rgba(34,211,165,.32);color:var(--green)}
.view-tab-custom{border-style:dashed}
.view-add{
  width:28px;height:28px;border-radius:999px;flex-shrink:0;
  font-size:16px;line-height:1;font-weight:700;
  color:var(--teal);background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.34);
  transition:all .2s
}
.view-add:hover{transform:rotate(90deg) scale(1.05);background:rgba(34,211,238,.2)}
.tab-strip-spacer{flex:1}

.main{display:grid;grid-template-columns:268px minmax(0,1.15fr) 360px;flex:1;overflow:hidden;min-height:0}
.col{overflow-y:auto;padding:12px}
.col-left{border-right:1px solid var(--border)}
.col-right{
  border-left:1px solid var(--border);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.right-scroll{min-height:0;overflow-y:auto;padding-right:2px}
.right-live{flex-shrink:0}

.sec-hdr{font-size:9px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--t3);padding:0 2px 8px;display:flex;align-items:center;gap:6px}
.sec-hdr-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.sec-hdr-link{font-size:9px;color:var(--blue);text-transform:none;letter-spacing:0;font-weight:500;opacity:.7;transition:opacity .15s;flex-shrink:0}
.sec-hdr-link:hover{opacity:1}
.col-right .sec-hdr{color:rgba(186,214,255,.9);text-shadow:0 0 10px rgba(68,184,255,.14)}

.bot-card,.pnl-wrap,.stat-card,.market-row,.bet-wrap,.ctrl-block,.feed-wrap{
  background:linear-gradient(180deg,rgba(18,29,49,.94),rgba(15,24,42,.88));
  border:1px solid var(--border);box-shadow:0 8px 24px rgba(1,5,12,.35),inset 0 1px 0 rgba(255,255,255,.02)
}
.bot-card{
  border-radius:var(--r);padding:12px;margin-bottom:9px;cursor:pointer;transition:all .2s;
  border-left:3px solid var(--coin-clr,var(--border));position:relative;overflow:hidden
}
.bot-card::after{content:'';position:absolute;inset:0;border-radius:var(--r);background:radial-gradient(circle at 85% 12%,rgba(68,184,255,.1),transparent 58%);pointer-events:none}
.bot-card:hover{border-color:var(--coin-clr);transform:translateY(-1px)}
.bot-card.sel{background:linear-gradient(180deg,rgba(24,38,64,.95),rgba(18,30,52,.94));box-shadow:0 0 0 1px rgba(114,153,228,.26),0 12px 28px rgba(0,0,0,.4)}
.bc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.bc-top-left{display:flex;flex-direction:column;gap:3px}
.bc-coin{font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--coin-clr,var(--t1))}
.bc-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.05em;text-transform:uppercase;align-self:flex-start}
.bc-status.live{background:rgba(34,211,165,.14);color:var(--green)}
.bc-status.paper{background:rgba(251,191,36,.14);color:var(--yellow)}
.bc-status.paused{background:rgba(251,146,60,.14);color:var(--orange)}
.bc-status.idle{background:var(--panel3);color:var(--t3)}
.bc-gauge-wrap{position:relative;flex-shrink:0;width:52px;height:52px}
.bc-gauge-svg{width:52px;height:52px;transform:rotate(-90deg)}
.bc-gauge-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bc-gauge-pct{font-family:var(--mono);font-size:10px;font-weight:700;line-height:1}
.bc-gauge-sub{font-size:7px;color:var(--t3);letter-spacing:.04em;text-transform:uppercase}
.bc-price{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--t1);margin-bottom:6px;display:flex;align-items:baseline;gap:5px}
.bc-price-dir{font-size:12px}
.bc-price-dir.up{color:var(--green)}
.bc-price-dir.dn{color:var(--red)}
.bc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:7px}
.bc-stat{display:flex;flex-direction:column;gap:1px}
.bc-stat-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.bc-stat-val{font-family:var(--mono);font-size:12px;font-weight:500}
.bc-stat-val.loss{color:var(--red)}
.bc-risk-wrap{margin-bottom:7px}
.bc-risk-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:3px;letter-spacing:.04em}
.bc-risk-track{height:4px;background:rgba(137,165,215,.18);border-radius:999px;overflow:hidden}
.bc-risk-fill{height:100%;border-radius:999px;transition:width .4s ease,background .4s ease}
.bc-market{font-size:10px;color:var(--t3);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-strategy{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.bc-results{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-bottom:7px}
.bc-res-cell{display:flex;align-items:center;justify-content:center;height:16px;border-radius:4px;font-size:9px;font-weight:700}
.bc-res-cell.win{background:rgba(34,211,165,.16);color:var(--green)}
.bc-res-cell.loss{background:rgba(244,63,94,.16);color:var(--red)}
.bc-res-cell.pend{background:var(--panel3);color:var(--t3);font-size:8px}
.bc-res-cell.mt{background:transparent}
.bc-reset{width:100%;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 0;border-radius:var(--rxs);background:rgba(53,82,136,.26);color:var(--t2);border:1px solid rgba(139,172,235,.24);transition:all .15s}
.bc-reset:hover{background:rgba(244,63,94,.12);color:var(--red);border-color:rgba(244,63,94,.3)}

.pnl-wrap,.bet-wrap,.ctrl-block,.feed-wrap{border-radius:var(--r);overflow:hidden}
.pnl-wrap{margin-bottom:12px}
.pnl-hdr,.feed-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3)}
.pnl-hdr-right{display:flex;align-items:center;gap:10px}
.pnl-val{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:0;text-transform:none}
.pnl-pts{font-size:8px;color:var(--t3);letter-spacing:.04em;text-transform:none}
.pnl-svg{display:block;width:100%;height:80px}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.stat-card{border-radius:var(--rs);padding:10px 12px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:34px;height:34px;background:radial-gradient(circle at 100% 0,rgba(68,184,255,.22),transparent 72%);pointer-events:none}
.stat-card-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.stat-card-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--t1)}
.stat-card-sub{font-size:9px;color:var(--t3);margin-top:2px}
.stat-card-duo{display:flex;align-items:baseline;gap:6px}
.stat-card-duo-sep{font-family:var(--mono);font-size:12px;color:var(--t3)}
.stat-card-duo-main{font-family:var(--mono);font-size:16px;font-weight:700}
.stat-card-duo-alt{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t2)}

/* Micro events ticker */
.micro-wrap{
  margin:0 0 12px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:8px 10px;border-radius:10px;
  background:linear-gradient(180deg,rgba(18,29,49,.9),rgba(15,24,42,.82));
  border:1px solid var(--border);
  box-shadow:0 8px 20px rgba(1,5,12,.28),inset 0 1px 0 rgba(255,255,255,.02)
}
.micro-tag{
  display:inline-flex;align-items:center;gap:5px;
  font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:3px 8px;border-radius:999px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:var(--t2);
  animation:micro-breathe 4s ease-in-out infinite
}
.micro-tag:nth-child(2){animation-delay:.35s}
.micro-tag:nth-child(3){animation-delay:.7s}
.micro-tag:nth-child(4){animation-delay:1.05s}
.micro-tag:nth-child(5){animation-delay:1.4s}
@keyframes micro-breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-1px)}}
.micro-tag .v{font-family:var(--mono);font-size:10px;letter-spacing:0;text-transform:none}
.micro-tag.good{color:var(--green);border-color:rgba(34,211,165,.3);background:rgba(34,211,165,.12)}
.micro-tag.warn{color:var(--orange);border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.12)}
.micro-tag.bad{color:var(--red);border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.12)}

/* Ultra-compact mode (optimized for smaller windows) */
.compact-ui .main{grid-template-columns:258px minmax(0,1.22fr) 328px}
.compact-ui .col{padding:10px}
.compact-ui .col-mid{padding:10px 12px !important}
.compact-ui .sec-hdr{font-size:8px;padding-bottom:6px}
.compact-ui .strat-btn{font-size:10px;padding:6px 0}
.compact-ui .ctrl-block{padding:9px}
.compact-ui .ctrl-row{margin-bottom:6px}
.compact-ui .ctrl-val{font-size:11px;padding:2px 6px;width:64px}
.compact-ui .action-grid{gap:4px}
.compact-ui .act-btn{font-size:10px;padding:6px 5px}
.compact-ui .bet-wrap.side{max-height:205px}
.compact-ui .bet-wrap.side .bet-table th,
.compact-ui .bet-wrap.side .bet-table td{font-size:9px;padding:3px 5px}
.compact-ui .feed-list{max-height:176px}
.compact-ui .compare-grid{gap:6px}
.compact-ui .micro-wrap{padding:7px 8px}
.compact-ui .stats-row{gap:6px;margin-bottom:10px}

/* Compare mode */
.compare-wrap{margin-bottom:12px}
.compare-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.compare-pill{
  font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 8px;border-radius:999px
}
.compare-pill.mixed{background:rgba(34,211,165,.14);color:var(--green)}
.compare-pill.single{background:rgba(148,163,184,.16);color:var(--t3)}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.compare-card{
  background:linear-gradient(180deg,rgba(18,29,49,.94),rgba(15,24,42,.88));
  border:1px solid var(--border);border-radius:var(--rs);padding:10px;overflow:hidden;
  box-shadow:0 8px 24px rgba(1,5,12,.35),inset 0 1px 0 rgba(255,255,255,.02);
  transition:transform .18s ease,border-color .18s ease
}
.compare-card:hover{transform:translateY(-2px);border-color:rgba(132,171,242,.42)}
.compare-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.compare-name{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.compare-name.dalembert{color:var(--teal)}
.compare-name.paroli{color:var(--purple)}
.compare-bots{font-family:var(--mono);font-size:10px;color:var(--t2)}
.compare-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.compare-kpi-cell{display:flex;flex-direction:column;gap:1px}
.compare-kpi-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.compare-kpi-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--t1)}
.compare-kpi-val.positive{color:var(--green)}
.compare-kpi-val.negative{color:var(--red)}
.compare-empty{font-size:10px;color:var(--t3)}
.compare-spark{margin-top:8px}
.compare-spark-svg{display:block;width:100%;height:44px}

.market-row{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:var(--rs);margin-bottom:5px}
.mr-coin{font-size:11px;font-weight:700;letter-spacing:.04em;width:30px;flex-shrink:0}
.mr-q{flex:1;font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mr-price{font-family:var(--mono);font-size:11px;font-weight:500;flex-shrink:0}
.mr-unit{font-size:10px;color:var(--t3);flex-shrink:0}
.mr-pending{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:1px 5px;border-radius:999px;flex-shrink:0}
.mr-pending.yes{background:rgba(34,211,165,.14);color:var(--green)}
.mr-pending.wait{background:var(--panel3);color:var(--t3)}

.bet-table{width:100%;border-collapse:collapse;font-size:11px}
.bet-table th{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);padding:7px 8px 6px;text-align:left;border-bottom:1px solid var(--border)}
.bet-table td{padding:5px 8px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px}
.bet-table tr:last-child td{border-bottom:none}
.bet-table tr:hover td{background:rgba(48,73,122,.3)}
.bet-wrap.side{max-height:240px;overflow:auto}
.bet-wrap.side .bet-table th,.bet-wrap.side .bet-table td{font-size:10px;padding:4px 6px}
.bt-win{color:var(--green)}
.bt-loss{color:var(--red)}
.bt-pend{color:var(--t3)}
.bt-coin{font-weight:700;font-size:10px;letter-spacing:.04em}
.bt-chain{font-size:13px;opacity:.45;transition:opacity .15s}
.bt-chain:hover{opacity:1}

.ctrl-block{padding:11px;margin-bottom:8px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl-lbl{font-size:11px;color:var(--t2)}
.ctrl-val{font-family:var(--mono);font-size:12px;font-weight:500;background:rgba(30,46,77,.55);border:1px solid var(--border2);border-radius:var(--rxs);padding:3px 8px;width:72px;text-align:right;color:var(--t1)}
.ctrl-val:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(68,184,255,.2)}

.strat-toggle{display:flex;gap:4px;margin-bottom:8px}
.strat-btn{
  flex:1;font-size:11px;font-weight:600;padding:7px 0;border-radius:10px;color:var(--t2);background:rgba(36,54,90,.24);border:1px solid transparent;transition:all .15s
}
.strat-btn.active{background:rgba(61,93,152,.4);border-color:rgba(130,165,232,.4);color:var(--t1)}
.strat-btn:hover:not(.active){background:rgba(64,96,158,.28);color:var(--t1)}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:0}
.act-btn{font-size:11px;font-weight:600;padding:7px 6px;border-radius:10px;text-align:center;transition:all .15s}
.act-btn.pause{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.act-btn.resume{background:rgba(34,211,165,.12);color:var(--green);border:1px solid rgba(34,211,165,.25)}
.act-btn.claim{background:rgba(68,184,255,.12);color:var(--blue);border:1px solid rgba(68,184,255,.25)}
.act-btn.stop{background:rgba(244,63,94,.12);color:var(--red);border:1px solid rgba(244,63,94,.25)}
.act-btn.start{background:rgba(34,211,165,.12);color:var(--green);border:1px solid rgba(34,211,165,.25)}
.act-btn:hover{filter:brightness(1.14);box-shadow:0 6px 16px rgba(0,0,0,.18)}
.act-btn:active{transform:scale(.97)}
.act-btn.full{grid-column:1/-1}
.act-btn:disabled{opacity:.35;cursor:default;filter:none}

.feed-list{max-height:220px;overflow-y:auto;padding:3px 0}
.feed-row{display:flex;align-items:baseline;gap:5px;padding:3px 8px;font-size:10px;line-height:1.5;border-bottom:1px solid var(--border)}
.feed-row:last-child{border-bottom:none}
.feed-ts{font-size:9px;color:var(--t3);flex-shrink:0;width:46px}
.feed-lvl{font-size:8px;font-weight:700;letter-spacing:.05em;flex-shrink:0;width:36px}
.feed-lvl.INFO{color:var(--green)}
.feed-lvl.WARNING{color:var(--orange)}
.feed-lvl.ERROR{color:var(--red)}
.feed-lvl.DEBUG{color:var(--t3)}
.feed-msg{color:var(--t2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-hdr-pill{font-size:8px;padding:1px 6px;border-radius:999px;background:rgba(34,211,165,.12);color:var(--green)}

#toastStack{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;font-size:12px;font-weight:600;
  backdrop-filter:blur(16px);border:1px solid;pointer-events:auto;animation:toast-in .25s cubic-bezier(.34,1.56,.64,1);min-width:210px;max-width:300px
}
.toast.win{background:rgba(34,211,165,.14);border-color:rgba(34,211,165,.32);color:var(--green);box-shadow:var(--glow-green),0 4px 24px rgba(0,0,0,.55)}
.toast.loss{background:rgba(244,63,94,.14);border-color:rgba(244,63,94,.32);color:var(--red);box-shadow:var(--glow-red),0 4px 24px rgba(0,0,0,.55)}
.toast-icon{font-size:18px;flex-shrink:0}
.toast-body{flex:1;min-width:0}
.toast-title{font-weight:700;font-size:12px;letter-spacing:.02em}
.toast-sub{font-size:10px;opacity:.8;margin-top:1px}
.toast-close{font-size:14px;cursor:pointer;opacity:.55;flex-shrink:0;background:none;border:none;color:inherit}
.toast-close:hover{opacity:1}
@keyframes toast-in{from{opacity:0;transform:translateX(16px) scale(.96)}to{opacity:1;transform:translateX(0) scale(1)}}
.toast.toast-out{animation:toast-out .18s ease forwards}
@keyframes toast-out{to{opacity:0;transform:translateX(16px) scale(.94)}}

.empty{font-size:11px;color:var(--t3);padding:16px 10px;text-align:center}
</style>
</head>
<body>
<div class="shell">

<!-- Ticker -->
<div class="ticker">
  <div class="ticker-label">▌ CRYPTO</div>
  <div class="ticker-overflow">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
  <div class="ticker-live">● LIVE</div>
</div>

<div class="body" id="appBody">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-icon">⌬</div>
      <div class="sb-brand-text">
        <div class="sb-brand-name">Tool <span class="accent">Ryū</span></div>
        <div class="sb-brand-sub">Mission Control</div>
      </div>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-mode-wrap">
      <button class="sb-mode-btn" id="btnPaper" onclick="setMode(true)">Paper</button>
      <button class="sb-mode-btn" id="btnLive"  onclick="setMode(false)">Live</button>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-cluster" id="sbCluster" onclick="toggleCluster()">
      <div class="sb-cluster-head">
        <span class="sb-cluster-icon">✦</span>
        <span class="sb-cluster-label">Bots</span>
        <span class="sb-cluster-arrow">›</span>
      </div>
      <div class="sb-cluster-body" id="sbBotsList"></div>
    </div>

    <div class="sb-spacer"></div>

    <div class="sb-footer">
      <div class="sb-status-row">
        <div class="ws-dot" id="wsDot"></div>
        <span class="sb-clock" id="clock">--:--:-- UTC</span>
      </div>
      <div class="sb-footer-row2">
        <span class="tag active" id="botStatusTag">ACTIVE</span>
        <button class="pin-btn" id="pinBtn" onclick="toggleSidebarPin()" title="Pin sidebar open">📌</button>
        <button class="dim-btn" id="dimBtn" onclick="toggleDim()" title="Toggle dim mode">🌙</button>
      </div>
    </div>
  </aside>

  <!-- Workspace -->
  <div class="workspace">

    <div class="w-header">
      <div class="wh-left">
        <div class="wh-mode-badge" id="whModeBadge">
          <div class="wh-mode-dot" id="whModeDot"></div>
          <span id="whModeLabel">PAPER</span>
        </div>
      </div>
      <div class="wh-timer">
        <span class="wh-timer-lbl">Next Window</span>
        <span class="wh-timer-digits" id="wbarTime">5:00</span>
        <div class="wh-timer-track"><div class="wh-timer-fill" id="wbarFill" style="width:0%"></div></div>
      </div>
      <div class="window-phase" id="windowPhase"></div>
      <div class="wh-right">
        <span class="wh-clock" id="whClock">--:--:-- UTC</span>
        <button class="compact-toggle" id="compactBtn" onclick="toggleCompactUI()" title="Toggle ultra-compact layout">◱ Compact</button>
      </div>
    </div>

    <div class="tab-strip" id="tabStrip">
      <button class="bot-tab sel" data-coin="all" onclick="toggleTab('all')">
        <span class="tab-dot" style="background:var(--blue)"></span>ALL
      </button>
      <div class="view-tabs" id="viewTabs"></div>
      <button class="view-add" id="viewAddBtn" onclick="createCustomView()" title="Save current selection as custom tab">+</button>
      <div class="tab-strip-spacer"></div>
    </div>

    <main class="main">

      <!-- Left: bot cards -->
      <div class="col col-left">
        <div class="sec-hdr">Bots <div class="sec-hdr-line"></div></div>
        <div id="botGrid"></div>
      </div>

      <!-- Center -->
      <div class="col col-mid" style="padding:12px 14px">
        <div class="stats-row" id="statsRow"></div>
        <div class="micro-wrap" id="microWrap"></div>
        <div class="compare-wrap" id="compareWrap"></div>

        <div class="pnl-wrap">
          <div class="pnl-hdr">
            <span>P &amp; L</span>
            <div class="pnl-hdr-right">
              <span class="pnl-pts" id="pnlPts">-- bets</span>
              <span class="pnl-val" id="pnlVal">--</span>
            </div>
          </div>
          <svg class="pnl-svg" id="pnlChart" viewBox="0 0 200 80" preserveAspectRatio="none">
            <text x="100" y="43" text-anchor="middle" fill="rgba(241,245,249,.12)" font-size="10" font-family="JetBrains Mono,monospace">No data yet</text>
          </svg>
        </div>

        <div class="sec-hdr">Active Markets <div class="sec-hdr-line"></div></div>
        <div id="marketsList" style="margin-bottom:12px"></div>
      </div>

      <!-- Right: Controls + Feed -->
      <div class="col col-right">
        <div class="right-scroll">
        <div class="sec-hdr">✦ Strategy <div class="sec-hdr-line"></div></div>
        <div class="strat-toggle">
          <button class="strat-btn active" id="btnDal" onclick="setStrategy('dalembert')">D'Alembert</button>
          <button class="strat-btn"        id="btnPar" onclick="setStrategy('paroli')">Paroli</button>
        </div>

        <div class="sec-hdr">◈ Settings <div class="sec-hdr-line"></div></div>
        <div class="ctrl-block">
          <div class="ctrl-row">
            <span class="ctrl-lbl">Unit size ($)</span>
            <input class="ctrl-val" id="unitInput" type="number" min="1" max="500" step="1" value="5"
                   onchange="saveSetting('unit_size_usd', +this.value)"/>
          </div>
          <div class="ctrl-row">
            <span class="ctrl-lbl">D'Al cap (×)</span>
            <input class="ctrl-val" id="capInput" type="number" min="1" max="20" step="1" value="20"
                   onchange="saveSetting('max_unit_cap', +this.value)"/>
          </div>
        </div>

        <div class="sec-hdr">⚑ Actions <span style="font-size:8px;color:var(--t3);font-weight:400;text-transform:none;letter-spacing:0">(selected)</span> <div class="sec-hdr-line"></div></div>
        <div class="action-grid" style="margin-bottom:10px">
          <button class="act-btn pause"  onclick="bulkAction('pause')">⏸ Pause</button>
          <button class="act-btn resume" onclick="bulkAction('resume')">▶ Resume</button>
          <button class="act-btn claim full" onclick="apiPost('/api/claim')">✦ Claim Winnings</button>
          <button class="act-btn start" id="btnStart" onclick="apiPost('/api/start')">▶ Start</button>
          <button class="act-btn stop"  id="btnStop"  onclick="apiPost('/api/stop')">■ Stop</button>
          <button class="act-btn full" style="background:rgba(244,63,94,.06);color:var(--red);border:1px solid rgba(244,63,94,.12)" onclick="bulkReset()">↺ Reset D'Alembert</button>
          <button class="act-btn full" style="background:rgba(255,255,255,.04);color:var(--t2);border:1px solid var(--border)" onclick="apiPost('/api/restart')">↺ Restart Process</button>
        </div>

        <div class="sec-hdr">
          ⌁ Bet History <div class="sec-hdr-line"></div>
          <a class="sec-hdr-link" href="https://polygonscan.com/address/0x6dDa9aF8af7073a228b0F247978AD025cB4D8aFA" target="_blank">↗ PolygonScan</a>
        </div>
        <div class="bet-wrap side" style="margin-bottom:10px">
          <table class="bet-table">
            <thead><tr><th>Time</th><th>Coin</th><th>Side</th><th>Bet</th><th>Mkt</th><th>P&amp;L</th><th>Tx</th></tr></thead>
            <tbody id="betTbody"></tbody>
          </table>
        </div>
        </div>

        <div class="right-live">
        <div class="sec-hdr">☰ Live Feed <div class="sec-hdr-line"></div></div>
        <div class="feed-wrap">
          <div class="feed-hdr">
            <span>Stream</span>
            <span class="feed-hdr-pill" id="feedPill">LIVE</span>
          </div>
          <div class="feed-list" id="feedList"></div>
        </div>
        </div>
      </div>

    </main>
  </div>
</div>
</div>

<!-- Toast stack -->
<div id="toastStack"></div>

<script>
const COIN_CLR   = {btc:'var(--btc)',eth:'var(--eth)',sol:'var(--sol)',xrp:'var(--xrp)'};
const COIN_EMOJI = {btc:'₿',eth:'Ξ',sol:'◎',xrp:'✕'};
const WALLET     = '0x6dDa9aF8af7073a228b0F247978AD025cB4D8aFA';

let dimMode      = false;

let compactUI = false;
let customViews = [];

// ── WebSocket ────────────────────────────────────────────────
let ws, wsRetry = 0;
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen    = () => { wsRetry=0; document.getElementById('wsDot').classList.add('on'); };
  ws.onclose   = () => { document.getElementById('wsDot').classList.remove('on'); setTimeout(connect, Math.min(5000,500*(++wsRetry))); };
  ws.onmessage = e => { try { render(JSON.parse(e.data)); } catch(_){} };
}
connect();

// ── Chain data ────────────────────────────────────────────────
async function fetchChain() {
  try { const r = await fetch('/api/chain'); chainBets = await r.json(); } catch(_) {}
}
fetchChain(); setInterval(fetchChain, 30000);

function chainTxForCycle(cycle) {
  const wts = cycle.window_ts; if (!wts) return null;
  return chainBets.find(b => b.timestamp >= wts && b.timestamp < wts + 300) || null;
}

// ── Clock + timer ─────────────────────────────────────────────
setInterval(() => {
  const now = new Date();
  const utc = now.toUTCString().slice(17,25) + ' UTC';
  document.getElementById('clock').textContent   = utc;
  document.getElementById('whClock').textContent = utc;
  const elapsed = Math.floor(Date.now()/1000) % 300;
  const rem = 300 - elapsed;
  const m = Math.floor(rem/60), s = rem % 60;
  document.getElementById('wbarFill').style.width = (elapsed/300*100) + '%';
  document.getElementById('wbarTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  renderWindowPhase(elapsed);
}, 1000);

// ── Toast system ──────────────────────────────────────────────
function checkToasts() {
  if (!_outcomesReady) {
    S.bots.forEach(bot => {
      (bot.cycles||[]).forEach(c => {
        if (c.outcome !== null && c.outcome !== undefined)
          prevOutcomes[`${bot.name}:${c.window_ts}`] = c.outcome;
      });
    });
    _outcomesReady = true;
    return;
  }
  S.bots.forEach(bot => {
    (bot.cycles||[]).forEach(c => {
      if (c.outcome === null || c.outcome === undefined) return;
      const k = `${bot.name}:${c.window_ts}`;
      if (k in prevOutcomes) return;
      prevOutcomes[k] = c.outcome;
      const won = c.outcome === c.side;
      const p   = Math.max(.01, Math.min(.99, c.price || .5));
      const profit = won ? c.bet_usd*(1-p)/p : -c.bet_usd;
      showToast(won, (bot.coin_id||'btc').toUpperCase(), profit, c.bet_usd);
    });
  });
}

function showToast(won, coin, profit, bet) {
  const stack = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = `toast ${won ? 'win' : 'loss'}`;
  t.innerHTML = `
    <span class="toast-icon">${won ? '🏆' : '📉'}</span>
    <div class="toast-body">
      <div class="toast-title">${won ? 'WIN' : 'LOSS'} — ${coin}</div>
      <div class="toast-sub">Bet $${bet?.toFixed(2)||'?'} → ${profit>=0?'+':''}$${Math.abs(profit).toFixed(2)}</div>
    </div>
    <button class="toast-close" onclick="dismissToast(this.closest('.toast'))">✕</button>`;
  stack.appendChild(t);
  setTimeout(() => dismissToast(t), 5000);
}

function dismissToast(el) {
  if (!el || el.classList.contains('toast-out')) return;
  el.classList.add('toast-out');
  setTimeout(() => el.remove(), 200);
}

// ── Main render ───────────────────────────────────────────────
function render(data) {
  Object.assign(S, {
    bots:     data.bots || [],
    feed:     data.feed || [],
    mode:     data.mode || 'DRY RUN',
    stopped:  data.stopped || false,
    strategy: data.strategy || 'dalembert',
    strategyByCoin: data.strategy_by_coin || {},
    maxCap:   data.max_unit_cap || 20,
    unitUsd:  data.unit_size_usd || 5,
  });
  S.bots.forEach(bot => {
    if (!(bot.name in bankrollStart) && bot.bankroll > 0)
      bankrollStart[bot.name] = bot.bankroll;
  });
  checkToasts();
  renderTicker();
  if (!tabsInit) { buildTabs(); tabsInit = true; } else updateTabs();
  renderViewTabs();
  renderSidebarBots();
  renderBotGrid();
  renderStats();
  renderMicroEvents();
  renderCompareMode();
  renderPnlChart();
  renderMarkets();
  renderFeed();
  renderBetHistory();
  renderModeToggle();
  renderStrategyToggle();
  renderStopStart();
  if (document.activeElement !== document.getElementById('unitInput'))
    document.getElementById('unitInput').value = S.unitUsd;
  if (document.activeElement !== document.getElementById('capInput'))
    document.getElementById('capInput').value = S.maxCap;
  const tag = document.getElementById('botStatusTag');
  if (tag) { tag.className = 'tag '+(S.stopped?'stopped':'active'); tag.textContent = S.stopped?'STOPPED':'ACTIVE'; }
}

// ── Ticker ────────────────────────────────────────────────────
function fmtPrice(coin, p) {
  if (!p) return '--';
  if (coin==='xrp'||p<1) return '$'+p.toFixed(4);
  if (p<100) return '$'+p.toFixed(2);
  return '$'+p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function renderTicker() {
  const html = S.bots.map(bot => {
    const coin=(bot.coin_id||'btc').toLowerCase(), price=bot.coin_price, up=bot.coin_direction==='Yes';
    const clr=COIN_CLR[coin]||'var(--t1)';
    if (!sessStart[coin] && price) sessStart[coin] = price;
    const pct = (sessStart[coin]&&price) ? ((price-sessStart[coin])/sessStart[coin]*100) : 0;
    const pctStr = (pct>=0?'+':'')+pct.toFixed(2)+'%';
    return `<span class="tick-item"><span class="tick-dot" style="background:${clr}"></span><span class="tick-coin" style="color:${clr}">${coin.toUpperCase()}</span><span class="tick-price">${fmtPrice(coin,price)}</span><span class="tick-chg ${up?'up':'dn'}">${up?'▲':'▼'} ${pctStr}</span></span>`;
  }).join('');
  if (html) { const t=document.getElementById('tickerTrack'); t.innerHTML=html+html; }
}

// ── Sidebar bots ──────────────────────────────────────────────
function renderSidebarBots() {

      <span class="sb-bot-coin" style="color:${sel?clr:'var(--t2)'}">${COIN_EMOJI[coin]||''} ${coin.toUpperCase()}</span>
      <span class="sb-bot-price">${fmtPrice(coin,bot.coin_price)}</span>

// ── Tabs ──────────────────────────────────────────────────────
function buildTabs() {
  const strip = document.getElementById('tabStrip');
  S.bots.forEach(bot => {
    const coin=bot.coin_id||'btc', clr=COIN_CLR[coin]||'var(--blue)';
    const st = calcStreaks(bot.cycles || []);
    const btn = document.createElement('button');
    btn.className = 'bot-tab sel'; btn.dataset.coin = coin;
    btn.innerHTML = `<span class="tab-dot" style="background:${clr}"></span>${coin.toUpperCase()} <span class="tab-wl" id="tabwl-${coin}">${bot.wins}W ${bot.losses}L</span><span class="tab-streak" id="tabst-${coin}">S:${st.currentLabel} · LW${st.longestWin}/LL${st.longestLoss}</span>`;
    btn.onclick = () => toggleTab(coin);
    strip.insertBefore(btn, strip.querySelector('.tab-strip-spacer'));
  });
}

function updateTabs() {
  S.bots.forEach(bot => {
    const coin = bot.coin_id||'btc';
    const el = document.getElementById(`tabwl-${coin}`);
    if (el) el.textContent = `${bot.wins}W ${bot.losses}L`;
    const stEl = document.getElementById(`tabst-${coin}`);
    if (stEl) {
      const st = calcStreaks(bot.cycles || []);
      stEl.textContent = `S:${st.currentLabel} · LW${st.longestWin}/LL${st.longestLoss}`;
    }
  });
  const all = document.querySelector('[data-coin="all"]');
  if (all) all.classList.toggle('sel', selected.size === S.bots.length);
}

function toggleTab(coin) {
  activeViewId = 'manual';
  if (coin === 'all') {
    if (selected.size === S.bots.length) selected.clear();
    else S.bots.forEach(b => selected.add(b.coin_id||'btc'));
    if (selected.size === S.bots.length) activeViewId = 'all';
  } else {
    if (selected.has(coin)) selected.delete(coin); else selected.add(coin);
  }
  document.querySelectorAll('.bot-tab').forEach(btn => {
    const c = btn.dataset.coin;
    if (c==='all') btn.classList.toggle('sel', selected.size===S.bots.length);
    else btn.classList.toggle('sel', selected.has(c));
  });
  renderBotGrid(); renderSidebarBots(); renderPnlChart(); renderViewTabs();
}

// ── Bankroll gauge ────────────────────────────────────────────
function buildGauge(bot) {
  const start = bankrollStart[bot.name] || bot.bankroll || 100;
  const ratio = Math.min(1.5, Math.max(0, bot.bankroll / start));
  const r = 20, circ = 2 * Math.PI * r;
  const stroke = ratio >= 1 ? 'var(--green)' : ratio >= 0.7 ? 'var(--orange)' : 'var(--red)';
  const dash   = circ * Math.min(1, ratio);
  const pct    = Math.round(ratio * 100);
  return `<div class="bc-gauge-wrap">
    <svg class="bc-gauge-svg" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="4"/>
      <circle cx="26" cy="26" r="${r}" fill="none" stroke="${stroke}" stroke-width="4"
        stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
        stroke-linecap="round"
        style="transition:stroke-dasharray .5s ease,stroke .4s ease;filter:drop-shadow(0 0 4px ${stroke})"/>
    </svg>
    <div class="bc-gauge-label">
      <span class="bc-gauge-pct" style="color:${stroke}">${pct}%</span>
      <span class="bc-gauge-sub">roll</span>
    </div>
  </div>`;
}

// ── Risk meter ────────────────────────────────────────────────
function buildRiskMeter(bot) {
  const unit = bot.dalembert_unit || 1;
  const cap  = S.maxCap || 20;
  const pct  = Math.min(1, unit / cap);
  const clr  = pct < .4 ? 'var(--green)' : pct < .75 ? 'var(--orange)' : 'var(--red)';
  const exp  = (unit * (bot.unit_size_usd || S.unitUsd)).toFixed(0);
  return `<div class="bc-risk-wrap">
    <div class="bc-risk-lbl">
      <span>Risk · ${unit}× of ${cap}×</span>
      <span style="color:${clr}">$${exp}</span>
    </div>
    <div class="bc-risk-track">
      <div class="bc-risk-fill" style="width:${(pct*100).toFixed(1)}%;background:${clr};box-shadow:0 0 6px ${clr}40"></div>
    </div>
  </div>`;
}

// ── Results grid ──────────────────────────────────────────────
function buildResultsGrid(cycles) {
  const cells = Array.from({length:20}, (_,i) => {
    const c = cycles[i];
    if (!c) return '<div class="bc-res-cell mt"></div>';
    if (c.outcome===null||c.outcome===undefined) return '<div class="bc-res-cell pend">·</div>';
    const won = c.outcome===c.side;
    return `<div class="bc-res-cell ${won?'win':'loss'}">${won?'▲':'▼'}</div>`;
  });
  return `<div class="bc-results">${cells.join('')}</div>`;
}

// ── P&L chart ─────────────────────────────────────────────────
function renderPnlChart() {
  const allCycles = [];
  S.bots.forEach(bot => {
    const coin=bot.coin_id||'btc'; if (!selected.has(coin)) return;
    (bot.cycles||[]).forEach(c => allCycles.push({...c, coin}));
  });
  allCycles.sort((a,b) => a.window_ts - b.window_ts);
  const points=[]; let cum=0;
  allCycles.forEach(c => {
    if (c.outcome===null||c.outcome===undefined) return;
    const won=c.outcome===c.side, p=Math.max(.01,Math.min(.99,c.price||.5));
    cum += won ? c.bet_usd*(1-p)/p : -c.bet_usd;
    points.push(cum);
  });
  const svg  = document.getElementById('pnlChart');
  const valEl = document.getElementById('pnlVal'), ptsEl = document.getElementById('pnlPts');
  if (ptsEl) ptsEl.textContent = `${points.length} bet${points.length!==1?'s':''}`;
  if (points.length < 2) {
    svg.innerHTML = `<text x="100" y="43" text-anchor="middle" fill="rgba(241,245,249,.12)" font-size="10" font-family="JetBrains Mono,monospace">No data yet</text>`;
    if (valEl) valEl.textContent = '--'; return;
  }
  const W=200, H=80, pad=4;
  const minV=Math.min(0,...points), maxV=Math.max(0,...points), range=maxV-minV||1;
  const toX = i  => pad + (i/(points.length-1))*(W-pad*2);
  const toY = v  => (H-pad) - ((v-minV)/range)*(H-pad*2);
  const zeroY    = toY(0);
  const pathD    = 'M'+points.map((v,i)=>`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join('L');
  const fillD    = `${pathD}L${toX(points.length-1).toFixed(1)},${zeroY.toFixed(1)}L${pad},${zeroY.toFixed(1)}Z`;
  const last     = points[points.length-1], pos = last >= 0;
  const clr      = pos ? 'var(--green)' : 'var(--red)';
  const fill     = pos ? 'rgba(34,211,165,.09)' : 'rgba(244,63,94,.09)';
  const fid      = pos ? 'pg' : 'pr';
  svg.innerHTML = `
    <defs>
      <filter id="${fid}"><feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <line x1="${pad}" y1="${zeroY.toFixed(1)}" x2="${W-pad}" y2="${zeroY.toFixed(1)}" stroke="rgba(255,255,255,.07)" stroke-width=".5" stroke-dasharray="3,3"/>
    <path d="${fillD}" fill="${fill}"/>
    <path d="${pathD}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#${fid})"/>
    <circle cx="${toX(points.length-1).toFixed(1)}" cy="${toY(last).toFixed(1)}" r="3" fill="${clr}" filter="url(#${fid})"/>`;
  if (valEl) { valEl.textContent=(last>=0?'+':'')+'$'+Math.abs(last).toFixed(2); valEl.style.color=clr; }
}

// ── Stats ─────────────────────────────────────────────────────
function renderStats() {
  const vis  = S.bots.filter(b => selected.has(b.coin_id||'btc'));
  const bank = vis.reduce((a,b) => a+b.bankroll, 0);
  const W    = vis.reduce((a,b) => a+b.wins, 0);
  const L    = vis.reduce((a,b) => a+b.losses, 0);
  const wr   = (W+L)>0 ? Math.round(W/(W+L)*100) : 0;
  const cyc  = vis.reduce((a,b) => a+b.cycle_count, 0);

  const curWindowTs = Math.floor(Date.now()/1000/300)*300;
  const prevWindowTs = curWindowTs - 300;
  const allCycles = [];
  vis.forEach(b => (b.cycles||[]).forEach(c => allCycles.push(c)));

  const betsThisWindow = allCycles.filter(c => (c.window_ts||0) === curWindowTs).length;
  const prevResolved = allCycles.filter(c =>
    (c.window_ts||0) === prevWindowTs && c.outcome!==null && c.outcome!==undefined
  );
  const prevW = prevResolved.filter(c => c.outcome===c.side).length;
  const prevL = prevResolved.length - prevW;
  const wr5m = prevResolved.length ? Math.round(prevW / prevResolved.length * 100) : null;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-card-lbl">Bankroll</div><div class="stat-card-val">$${bank.toFixed(0)}</div><div class="stat-card-sub">${vis.length} bot${vis.length!==1?'s':''}</div></div>
    <div class="stat-card">
      <div class="stat-card-lbl">Win Rate (5m / total)</div>
      <div class="stat-card-duo">
        <span class="stat-card-duo-main" style="color:${wr5m===null?'var(--t2)':wr5m>=50?'var(--green)':'var(--red)'}">${wr5m===null?'--':wr5m+'%'}</span>
        <span class="stat-card-duo-sep">/</span>
        <span class="stat-card-duo-alt" style="color:${wr>=50?'var(--green)':'var(--red)'}">${wr}%</span>
      </div>
      <div class="stat-card-sub">${prevW}W / ${prevL}L last window · ${W}W / ${L}L total</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-lbl">Cycles (5m / total)</div>
      <div class="stat-card-duo">
        <span class="stat-card-duo-main">${betsThisWindow}</span>
        <span class="stat-card-duo-sep">/</span>
        <span class="stat-card-duo-alt">${cyc}</span>
      </div>
      <div class="stat-card-sub">this 5m window / total bets</div>
    </div>
    <div class="stat-card"><div class="stat-card-lbl">Mode</div><div class="stat-card-val" style="font-size:11px;color:${S.mode==='LIVE'?'var(--green)':'var(--yellow)'}">${S.mode==='LIVE'?'LIVE':'PAPER'}</div><div class="stat-card-sub">${S.stopped?'stopped':'running'}</div></div>`;
}

function _pnlFromCycle(c) {
  const won = c.outcome===c.side;
  const p = Math.max(.01, Math.min(.99, c.price || .5));
  return won ? c.bet_usd*(1-p)/p : -c.bet_usd;
}

function renderMicroEvents() {
  const el = document.getElementById('microWrap');
  if (!el) return;
  const vis = S.bots.filter(b => selected.has(b.coin_id||'btc'));
  if (!vis.length) {
    el.innerHTML = `<span class="micro-tag"><span>Selection</span><span class="v">No bots selected</span></span>`;
    return;
  }

  const elapsed = Math.floor(Date.now()/1000) % 300;
  const rem = 300 - elapsed;
  const mm = Math.floor(rem/60), ss = rem % 60;
  const phaseIdx = Math.floor(elapsed / 60) + 1;

  const stratPnl = {dalembert:0, paroli:0};
  const coinPnl = {};
  let pending = 0, resolved = 0;

  vis.forEach(b => {
    const strat = ((b.strategy || S.strategy || 'dalembert')+'').toLowerCase();
    const coin = (b.coin_id || 'btc').toLowerCase();
    (b.cycles||[]).forEach(c => {
      if (c.outcome===null || c.outcome===undefined) { pending += 1; return; }
      resolved += 1;
      const pnl = _pnlFromCycle(c);
      if (stratPnl[strat] !== undefined) stratPnl[strat] += pnl;
      coinPnl[coin] = (coinPnl[coin] || 0) + pnl;
    });
  });

  const bestStrat = stratPnl.dalembert >= stratPnl.paroli ? 'dalembert' : 'paroli';
  const bestStratPnl = stratPnl[bestStrat] || 0;

  let bestCoin = '--', bestCoinPnl = 0;
  Object.entries(coinPnl).forEach(([c,v]) => {
    if (bestCoin==='--' || v > bestCoinPnl) { bestCoin = c.toUpperCase(); bestCoinPnl = v; }
  });

  const pr = resolved > 0 ? Math.round((resolved/(resolved+pending))*100) : 0;
  const phaseLabel = rem <= 75 ? 'close phase' : rem <= 165 ? 'decision phase' : 'scan phase';
  const pendingClass = pending >= 4 ? 'warn' : pending > 0 ? 'good' : '';

  el.innerHTML = `
    <span class="micro-tag"><span>Window</span><span class="v">${mm}:${ss.toString().padStart(2,'0')} left</span></span>
    <span class="micro-tag"><span>Phase ${phaseIdx}/5</span><span class="v">${phaseLabel}</span></span>
    <span class="micro-tag ${bestStratPnl>=0?'good':'bad'}"><span>Best Strategy</span><span class="v">${bestStrat.toUpperCase()} ${bestStratPnl>=0?'+':'-'}$${Math.abs(bestStratPnl).toFixed(2)}</span></span>
    <span class="micro-tag ${bestCoinPnl>=0?'good':'bad'}"><span>Hot Coin</span><span class="v">${bestCoin} ${bestCoinPnl>=0?'+':'-'}$${Math.abs(bestCoinPnl).toFixed(2)}</span></span>
    <span class="micro-tag ${pendingClass}"><span>Resolve</span><span class="v">${resolved} done · ${pending} pending · ${pr}%</span></span>`;
}

function calcStreaks(cycles) {
  const resolved = (cycles || [])
    .filter(c => c.outcome!==null && c.outcome!==undefined)
    .sort((a,b)=>(a.window_ts||0)-(b.window_ts||0));
  let longestWin = 0, longestLoss = 0;
  let curType = '', curLen = 0;
  resolved.forEach(c => {
    const t = c.outcome===c.side ? 'win' : 'loss';
    if (t === curType) curLen += 1;
    else { curType = t; curLen = 1; }
    if (t === 'win') longestWin = Math.max(longestWin, curLen);
    else longestLoss = Math.max(longestLoss, curLen);
  });
  const currentLabel = curType==='win' ? `W${curLen}` : curType==='loss' ? `L${curLen}` : '-';
  return {longestWin, longestLoss, currentLabel};
}

function getPresetCoins(id) {
  const all = S.bots.map(b => (b.coin_id||'btc').toLowerCase());
  if (id === 'all') return [...new Set(all)];
  if (id === 'core') return all.filter(c => c==='btc' || c==='eth');
  if (id === 'alts') return all.filter(c => c==='sol' || c==='xrp');
  if (id === 'live') return S.bots.filter(b => b.status==='LIVE' && !b.paused).map(b => (b.coin_id||'btc').toLowerCase());
  if (id.startsWith('custom:')) {
    const found = customViews.find(v => v.id === id);
    if (!found) return [];
    return found.coins.filter(c => all.includes(c));
  }
  return [];
}

function applyPreset(id) {
  const coins = getPresetCoins(id);
  if (!coins.length && id !== 'all') return;
  selected.clear();
  if (id === 'all') S.bots.forEach(b => selected.add((b.coin_id||'btc').toLowerCase()));
  else coins.forEach(c => selected.add(c));
  activeViewId = id;
  document.querySelectorAll('.bot-tab').forEach(btn => {
    const c = btn.dataset.coin;
    if (c==='all') btn.classList.toggle('sel', selected.size===S.bots.length);
    else btn.classList.toggle('sel', selected.has(c));
  });
  renderViewTabs();
  renderBotGrid(); renderSidebarBots(); renderStats(); renderCompareMode(); renderPnlChart(); renderMarkets(); renderBetHistory();
}

function renderViewTabs() {
  const wrap = document.getElementById('viewTabs');
  if (!wrap) return;
  const presets = [
    {id:'core', label:'Core'},
    {id:'alts', label:'Alts'},
    {id:'live', label:'Live'},
  ];
  const html = [];
  presets.forEach(p => {
    const n = getPresetCoins(p.id).length;
    if (!n) return;
    html.push(`<button class="view-tab ${activeViewId===p.id?'active':''}" onclick="applyPreset('${p.id}')">${p.label} <span class="v">${n}</span></button>`);
  });
  customViews.forEach(v => {
    const n = getPresetCoins(v.id).length;
    if (!n) return;
    html.push(`<button class="view-tab view-tab-custom ${activeViewId===v.id?'active':''}" onclick="applyPreset('${v.id}')" title="${v.name}">${escHtml(v.name)} <span class="v">${n}</span></button>`);
  });
  wrap.innerHTML = html.join('');
}

function loadCustomViews() {
  try {
    const raw = localStorage.getItem('customViews');
    const arr = JSON.parse(raw || '[]');
    if (!Array.isArray(arr)) return;
    customViews = arr
      .filter(v => v && typeof v.name==='string' && Array.isArray(v.coins))
      .slice(0, 8)
      .map(v => ({id:v.id || `custom:${Math.random().toString(36).slice(2,8)}`, name:v.name.slice(0,16), coins:v.coins.map(c => (c||'').toLowerCase())}));
  } catch (_) {
    customViews = [];
  }
}

function saveCustomViews() {
  try {
    localStorage.setItem('customViews', JSON.stringify(customViews));
  } catch (_) {}
}

function createCustomView() {
  const coins = [...selected];
  if (!coins.length) {
    alert('Select at least one coin tab first.');
    return;
  }
  const name = (prompt('Name this custom tab (max 16 chars):', `View ${customViews.length+1}`) || '').trim();
  if (!name) return;
  const item = {
    id: `custom:${Date.now().toString(36)}`,
    name: name.slice(0, 16),
    coins: coins.map(c => c.toLowerCase()),
  };
  customViews.push(item);
  customViews = customViews.slice(-8);
  activeViewId = item.id;
  saveCustomViews();
  renderViewTabs();
}

function renderCompareMode() {
  const el = document.getElementById('compareWrap');
  if (!el) return;
  const vis = S.bots.filter(b => selected.has(b.coin_id||'btc'));
  if (!vis.length) { el.innerHTML = ''; return; }

  const init = () => ({bots:0,wins:0,losses:0,cycles:0,bankroll:0,pnl:0});
  const agg = {dalembert:init(), paroli:init()};
  const points = {dalembert:[], paroli:[]};
  const byTs = {dalembert:[], paroli:[]};

  const pnlOf = c => {
    const won = c.outcome===c.side;
    const p = Math.max(.01, Math.min(.99, c.price || .5));
    return won ? c.bet_usd*(1-p)/p : -c.bet_usd;
  };

  vis.forEach(bot => {
    const key = ((bot.strategy || S.strategy || 'dalembert')+'').toLowerCase();
    if (!agg[key]) return;
    const g = agg[key];
    g.bots += 1;
    g.wins += bot.wins || 0;
    g.losses += bot.losses || 0;
    g.cycles += bot.cycle_count || 0;
    g.bankroll += bot.bankroll || 0;
    (bot.cycles || []).forEach(c => {
      if (c.outcome===null || c.outcome===undefined) return;
      const pnl = pnlOf(c);
      g.pnl += pnl;
      byTs[key].push({ts: c.window_ts || 0, pnl});
    });
  });

  ['dalembert','paroli'].forEach(key => {
    byTs[key].sort((a,b) => a.ts - b.ts);
    let cum = 0;
    byTs[key].forEach(r => { cum += r.pnl; points[key].push(cum); });
  });

  const activeStrategies = ['dalembert','paroli'].filter(k => agg[k].bots > 0);
  const mixed = activeStrategies.length > 1;

  const card = (key, title) => {
    const g = agg[key];
    const total = g.wins + g.losses;
    const wr = total ? Math.round(g.wins / total * 100) : 0;
    const pnlClass = g.pnl >= 0 ? 'positive' : 'negative';
    const spark = buildSpark(points[key], key==='paroli' ? 'var(--purple)' : 'var(--teal)');
    return `<div class="compare-card">
      <div class="compare-top">
        <span class="compare-name ${key}">${title}</span>
        <span class="compare-bots">${g.bots} bot${g.bots!==1?'s':''}</span>
      </div>
      ${g.bots===0 ? `<div class="compare-empty">No selected bots</div>` : `
      <div class="compare-kpi">
        <div class="compare-kpi-cell"><span class="compare-kpi-lbl">W / L</span><span class="compare-kpi-val">${g.wins} / ${g.losses}</span></div>
        <div class="compare-kpi-cell"><span class="compare-kpi-lbl">Win Rate</span><span class="compare-kpi-val">${wr}%</span></div>
        <div class="compare-kpi-cell"><span class="compare-kpi-lbl">Cycles</span><span class="compare-kpi-val">${g.cycles}</span></div>
        <div class="compare-kpi-cell"><span class="compare-kpi-lbl">Bankroll</span><span class="compare-kpi-val">$${g.bankroll.toFixed(0)}</span></div>
        <div class="compare-kpi-cell"><span class="compare-kpi-lbl">Recent PnL</span><span class="compare-kpi-val ${pnlClass}">${g.pnl>=0?'+':'-'}$${Math.abs(g.pnl).toFixed(2)}</span></div>
      </div>`}
      ${spark}
    </div>`;
  };

  el.innerHTML = `
    <div class="compare-hdr">
      <div class="sec-hdr" style="padding-bottom:0">Compare Mode <div class="sec-hdr-line"></div></div>
      <span class="compare-pill ${mixed?'mixed':'single'}">${mixed?'mixed':'single strategy'}</span>
    </div>
    <div class="compare-grid">
      ${card('dalembert',"D'Alembert")}
      ${card('paroli','Paroli')}
    </div>`;
}

function buildSpark(vals, clr) {
  if (!vals || vals.length < 2) return '';
  const W = 200, H = 44, pad = 3;
  const minV = Math.min(0, ...vals), maxV = Math.max(0, ...vals), range = (maxV - minV) || 1;
  const toX = i => pad + (i/(vals.length-1))*(W-pad*2);
  const toY = v => (H-pad) - ((v-minV)/range)*(H-pad*2);
  const zeroY = toY(0);
  const pathD = 'M'+vals.map((v,i)=>`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join('L');
  return `<div class="compare-spark">
    <svg class="compare-spark-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <line x1="${pad}" y1="${zeroY.toFixed(1)}" x2="${W-pad}" y2="${zeroY.toFixed(1)}" stroke="rgba(255,255,255,.12)" stroke-width=".6" stroke-dasharray="2,2"/>
      <path d="${pathD}" fill="none" stroke="${clr}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  </div>`;
}

function renderWindowPhase(elapsed) {
  const el = document.getElementById('windowPhase');
  if (!el) return;
  const minute = Math.min(4, Math.floor(elapsed / 60));
  const minutePct = ((elapsed % 60) / 60) * 100;
  const cells = Array.from({length:5}, (_,i) => {
    const done = i < minute;
    const active = i === minute;
    const pct = done ? 100 : active ? minutePct : 0;
    return `<span class="phase-cell ${done?'done':''} ${active?'active':''}"><span class="phase-fill" style="width:${pct.toFixed(1)}%"></span></span>`;
  });
  el.innerHTML = cells.join('');
}

// ── Markets ───────────────────────────────────────────────────
function renderMarkets() {
  const el   = document.getElementById('marketsList');
  const rows = S.bots.filter(b => selected.has(b.coin_id||'btc') && b.market_question).map(bot => {
    const coin=bot.coin_id||'btc', clr=COIN_CLR[coin]||'var(--t1)';
    const up=bot.coin_direction==='Yes', pend=bot.bet_pending;
    return `<div class="market-row">
      <span class="mr-coin" style="color:${clr}">${coin.toUpperCase()}</span>
      <span class="mr-q">${bot.market_question}</span>
      <span class="mr-price" style="color:${up?'var(--green)':'var(--red)'}">${up?'▲':'▼'} ${bot.coin_price?fmtPrice(coin,bot.coin_price):'--'}</span>
      <span class="mr-unit">${bot.dalembert_unit}×</span>
      <span class="mr-pending ${pend?'yes':'wait'}">${pend?'BET':'OPEN'}</span>
    </div>`;
  });
  el.innerHTML = rows.length ? rows.join('') : '<div class="empty">Waiting for market data…</div>';
}

// ── Feed ──────────────────────────────────────────────────────
let lastFeedLen = 0;
function renderFeed() {
  const el = document.getElementById('feedList');
  if (S.feed.length === lastFeedLen) return;
  lastFeedLen = S.feed.length;
  const atBottom = el.scrollHeight - el.scrollTop < el.clientHeight + 40;
  el.innerHTML = S.feed.map(([ts,lvl,msg]) =>
    `<div class="feed-row"><span class="feed-ts">${ts}</span><span class="feed-lvl ${lvl}">${lvl}</span><span class="feed-msg">${escHtml(msg)}</span></div>`
  ).join('');
  if (atBottom) el.scrollTop = el.scrollHeight;
}

// ── Bet history ───────────────────────────────────────────────
function renderBetHistory() {
  const allCycles = [];
  S.bots.forEach(bot => {
    const coin=bot.coin_id||'btc'; if (!selected.has(coin)) return;
    (bot.cycles||[]).forEach(c => allCycles.push({...c, coin}));
  });
  allCycles.sort((a,b) => b.window_ts - a.window_ts);
  const tbody = document.getElementById('betTbody');
  if (!allCycles.length) { tbody.innerHTML=`<tr><td colspan="7" class="empty">No bets yet</td></tr>`; return; }
  tbody.innerHTML = allCycles.slice(0,30).map(c => {
    const coin=c.coin||'btc', clr=COIN_CLR[coin]||'var(--t1)';
    const ts   = new Date(c.window_ts*1000).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
    const mkt  = c.price ? Math.round(c.price*100)+'¢' : '--';
    const side = c.side || '--';
    let pnl='⏳', pnlClass='bt-pend';
    if (c.outcome!==null && c.outcome!==undefined) {
      const won=c.outcome===c.side, p=Math.max(.01,Math.min(.99,c.price||.5));
      const profit = won ? c.bet_usd*(1-p)/p : -c.bet_usd;
      pnl = (profit>=0?'+':'')+'$'+Math.abs(profit).toFixed(2);
      pnlClass = won ? 'bt-win' : 'bt-loss';
    }
    const chainTx   = chainTxForCycle(c);
    const chainCell = chainTx
      ? `<td><a class="bt-chain" href="https://polygonscan.com/tx/${chainTx.tx_hash}" target="_blank" title="$${chainTx.amount_usdc.toFixed(2)} USDC">🔗</a></td>`
      : `<td><a class="bt-chain" style="opacity:.15" href="https://polygonscan.com/address/${WALLET}" target="_blank">·</a></td>`;
    return `<tr><td style="color:var(--t3)">${ts}</td><td><span class="bt-coin" style="color:${clr}">${coin.toUpperCase()}</span></td><td style="color:${side==='Yes'?'var(--green)':'var(--red)'}">${side}</td><td>$${c.bet_usd?.toFixed(2)||'--'}</td><td style="color:var(--t3)">${mkt}</td><td class="${pnlClass}">${pnl}</td>${chainCell}</tr>`;
  }).join('');
}

// ── Mode / strategy / stop ────────────────────────────────────

  const isPaper = S.mode !== 'LIVE';
  document.getElementById('btnPaper').className = 'sb-mode-btn'+(isPaper?' active-paper':'');
  document.getElementById('btnLive').className  = 'sb-mode-btn'+(!isPaper?' active-live':'');

  if (badge&&dot&&lbl) {

    badge.style.borderColor = isPaper ? 'rgba(251,191,36,.15)' : 'rgba(34,211,165,.15)';
    badge.style.background  = isPaper ? 'rgba(251,191,36,.07)' : 'rgba(34,211,165,.07)';
  }
}
async function setMode(paper) { await apiPost('/api/mode', {paper}); }

function renderStrategyToggle() {
  const selBots = S.bots.filter(b => selected.has(b.coin_id||'btc'));
  const active = new Set(selBots.map(b => (b.strategy || S.strategy || 'dalembert').toLowerCase()));
  const mixed = active.size > 1;
  const single = mixed ? '' : [...active][0] || S.strategy || 'dalembert';

  const dal = document.getElementById('btnDal');
  const par = document.getElementById('btnPar');
  dal.classList.toggle('active', single==='dalembert');
  par.classList.toggle('active', single==='paroli');
  dal.textContent = mixed ? "D'Alembert *" : "D'Alembert";
  par.textContent = mixed ? "Paroli *" : "Paroli";
}
async function setStrategy(name) {
  const coins = [...selected];
  const body = {name};
  if (coins.length) body.coins = coins;
  await apiPost('/api/strategy', body);
}

function renderStopStart() {
  document.getElementById('btnStop').disabled  = S.stopped;
  document.getElementById('btnStart').disabled = !S.stopped;
}

// ── Bulk actions ──────────────────────────────────────────────
async function bulkAction(action) {
  const targets = S.bots.filter(b => selected.has(b.coin_id||'btc'));
  await Promise.all(targets.map(b => apiPost(`/api/bot/${encodeURIComponent(b.name)}/${action}`)));
}
async function resetBot(name) {
  if (!confirm(`Reset D'Alembert state for ${name}?`)) return;
  await apiPost(`/api/bot/${encodeURIComponent(name)}/reset`);
}
async function bulkReset() {
  const targets = S.bots.filter(b => selected.has(b.coin_id||'btc'));
  if (!confirm(`Reset D'Alembert state for: ${targets.map(b=>b.name).join(', ')}?`)) return;
  await Promise.all(targets.map(b => apiPost(`/api/bot/${encodeURIComponent(b.name)}/reset`)));
}
async function saveSetting(key, val) {
  const coins=[...selected], body={[key]:val};
  if (coins.length < S.bots.length) body.coins = coins;
  await apiPost('/api/settings', body);
}

// ── Helpers ───────────────────────────────────────────────────
async function apiPost(url, body={}) {
  try { const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); return await r.json(); }
  catch(e) { return {ok:false}; }
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 4:3 viewport fit mode ─────────────────────────────────────
function applyViewportFit() {
  const root = document.documentElement;
  const targetW = 1280; // 4:3 base canvas width
  const targetH = 960;  // 4:3 base canvas height
  const vw = Math.max(320, window.innerWidth || targetW);
  const vh = Math.max(320, window.innerHeight || targetH);
  const scale = Math.min(1, vw / targetW, vh / targetH);
  const left = Math.max(0, (vw - targetW * scale) / 2);
  const top = Math.max(0, (vh - targetH * scale) / 2);

  root.style.setProperty('--fit-w', String(targetW));
  root.style.setProperty('--fit-h', String(targetH));
  root.style.setProperty('--fit-scale', scale.toFixed(4));
  root.style.setProperty('--fit-left', `${left.toFixed(1)}px`);
  root.style.setProperty('--fit-top', `${top.toFixed(1)}px`);
}

initSidebarMode();
initCompactUI();
loadCustomViews();
applyViewportFit();
renderWindowPhase(Math.floor(Date.now()/1000) % 300);
renderMicroEvents();
setInterval(renderMicroEvents, 10000);
window.addEventListener('resize', applyViewportFit);
